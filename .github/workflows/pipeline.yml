name: DeployLynx CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t deploylynx-app .

      - name: Security Scan (Trivy)
        run: docker run --rm aquasec/trivy image deploylynx-app
