name: DeployLynx CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t deploylynx-app .

      # 3️⃣ Install Trivy (fixed method)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 4️⃣ Run Trivy scan on filesystem (app directory)
      - name: Security Scan - Filesystem
        run: trivy fs --exit-code 1 --severity HIGH,CRITICAL .

      # 5️⃣ Run Trivy scan on Docker image
      - name: Security Scan - Docker Image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL deploylynx-app
